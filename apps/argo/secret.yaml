apiVersion: ricoberger.de/v1alpha1
kind: VaultSecret
metadata:
  name: argocd-secret
  namespace: argocd
spec:
  # Setup (one-time):
  #   PASS=$(htpasswd -bnBC 10 "" 'yourpassword' | tr -d ':\n')
  #   SECRETKEY=$(kubectl get secret argocd-secret -n argocd -o jsonpath='{.data.server\.secretkey}' | base64 -d)
  #   vault kv put kvv2/argocd \
  #     password="$PASS" \
  #     passwordMtime="$(date +%FT%T%Z)" \
  #     serverSecretKey="$SECRETKEY"
  path: kvv2/argocd
  type: Opaque
  templates:
    admin.password: "{% .Secrets.password %}"
    admin.passwordMtime: "{% .Secrets.passwordMtime %}"
