apiVersion: ricoberger.de/v1alpha1
kind: VaultSecret
metadata:
  name: argocd-secret
  namespace: argocd
spec:
  # Store the bcrypt-hashed password in Vault:
  #   PASS=$(htpasswd -bnBC 10 "" <yourpassword> | tr -d ':\n')
  #   vault kv put kvv2/argocd admin.password="$PASS" admin.passwordMtime="$(date +%FT%T%Z)"
  path: kvv2/argocd
  type: Opaque
  templates:
    admin.password: "{% .Secrets.admin.password %}"
    admin.passwordMtime: "{% .Secrets.admin.passwordMtime %}"
