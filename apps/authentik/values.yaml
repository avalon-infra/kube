authentik:
  postgresql:
    host: 1.2.3.4
    user: file:///postgres-creds/username
    password: file:///postgres-creds/password
    name: authentik
    port: 5431
  existingSecret:
    secretName: authentik-secret
    secretKey: AUTHENTIK_SECRET_KEY

postgresql:
  enabled: false

redis:
  enabled: true

server:
  volumes:
    - name: postgres-creds
      secret:
        secretName: authentik-postgres-credentials
  volumeMounts:
    - name: postgres-creds
      mountPath: /postgres-creds
      readOnly: true

worker:
  volumes:
    - name: postgres-creds
      secret:
        secretName: authentik-postgres-credentials
  volumeMounts:
    - name: postgres-creds
      mountPath: /postgres-creds
      readOnly: true
