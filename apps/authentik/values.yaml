authentik:
  postgresql:
    host: postgres.authentik.svc.cluster.local
    user: file:///postgres-creds/username
    password: file:///postgres-creds/password
    name: authentik
    port: 5432

env:
  AUTHENTIK_SECRET_KEY:
    valueFrom:
      secretKeyRef:
        name: authentik-secret
        key: AUTHENTIK_SECRET_KEY

postgresql:
  enabled: false

redis:
  enabled: true

server:
  volumes:
    - name: postgres-creds
      secret:
        secretName: authentik-postgres-credentials
  volumeMounts:
    - name: postgres-creds
      mountPath: /postgres-creds
      readOnly: true

worker:
  volumes:
    - name: postgres-creds
      secret:
        secretName: authentik-postgres-credentials
  volumeMounts:
    - name: postgres-creds
      mountPath: /postgres-creds
      readOnly: true
