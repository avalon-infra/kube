apiVersion: apps/v1
kind: Deployment
metadata:
  name: affine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: affine
  template:
    metadata:
      labels:
        app: affine
    spec:
      containers:
        - name: affine
          image: ghcr.io/toeverything/affine:stable
          ports:
            - containerPort: 3010
              name: http
          envFrom:
            - secretRef:
                name: affine-env
          env:
            - name: DATABASE_URL
              value: "postgresql://$(DB_USERNAME):$(DB_PASSWORD)@postgres:5432/affine"
            - name: AFFINE_INDEXER_ENABLED
              value: "false"
          volumeMounts:
            - name: affine-storage
              mountPath: /root/.affine/storage
            - name: affine-config
              mountPath: /root/.affine/config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: affine-storage
          persistentVolumeClaim:
            claimName: affine-storage
        - name: affine-config
          persistentVolumeClaim:
            claimName: affine-config
---
apiVersion: v1
kind: Service
metadata:
  name: affine
spec:
  ports:
    - port: 3010
      targetPort: http
      name: http
  selector:
    app: affine
