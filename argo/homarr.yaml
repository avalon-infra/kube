apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homarr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - chart: homarr
      repoURL: oci://ghcr.io/homarr-labs/charts
      targetRevision: "8.18.1"
      helm:
        valueFiles:
          - "$values/apps/homarr/values.yaml"
    - repoURL: https://github.com/avalon-infra/kube.git
      targetRevision: HEAD
      path: apps/homarr
      ref: values
  destination:
    name: in-cluster
    namespace: homarr
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
